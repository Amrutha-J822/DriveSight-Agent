services:
  - type: web
    name: drivesight-agent-api
    runtime: python
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: drivesight-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DRIVESIGHT_DB_PATH
        value: /var/data/drivesight.db
      - key: DRIVESIGHT_UPLOAD_DIR
        value: /var/data/uploads
      - key: ALLOWED_ORIGINS
        sync: false
      - key: YOLO_MODEL_PATH
        sync: false
      - key: LLM_PROVIDER
        value: local
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
